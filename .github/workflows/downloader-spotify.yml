name: "downloader-spotify"

on:
  workflow_dispatch:
    inputs:
      urls:
        description: >
          Enter one or more Spotify / Tidal / Apple Music / SoundCloud / YouTube / Pandora URLs
          (track, album, playlist, artist). Separate by commas, spaces, or newlines.
        required: true
        type: string
      output_format:
        description: "Output Format"
        required: true
        type: choice
        options:
          - flac
          - mp3
          - m4a
          - ogg
          - opus
          - wav
        default: flac
      audio_quality:
        description: >
          Audio Quality / Bitrate.
          For FLAC: LOSSLESS, HI_RES_LOSSLESS, DOLBY_ATMOS, HIGH, LOW.
          For MP3/M4A/OGG/Opus: 320k, 256k, 192k, 128k.
        required: true
        type: choice
        options:
          - LOSSLESS
          - HI_RES_LOSSLESS
          - DOLBY_ATMOS
          - HIGH
          - LOW
          - 320k
          - 256k
          - 192k
          - 128k
        default: LOSSLESS
      upload_method:
        description: 'Upload destination'
        required: true
        type: choice
        options:
          - repo
          - release
          - drive
        default: repo
      bundle_all:
        description: 'Bundle all downloaded tracks into a single ZIP (true) or create a ZIP for each track (false)'
        type: boolean
        default: true
      vpn_enabled:
        description: 'Route downloads through WireGuard VPN (requires secret WG_CONFIG)'
        type: boolean
        default: false
      # ─── NEW INPUTS ───────────────────────────────────
      concurrent_downloads:
        description: 'Number of URLs to download at the same time'
        type: number
        default: 4
        required: false
      retry_count:
        description: 'How many times to retry a failed URL before falling back to SpotiFLAC'
        type: number
        default: 3
        required: false
      # ─── END NEW INPUTS ───────────────────────────────

permissions:
  contents: write

jobs:
  music-download:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install System Dependencies
        shell: bash
        run: |
          set -e
          echo "::group::System packages"
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl jq zip python3 python3-pip
          echo "::endgroup::"

          echo "::group::Python tools"
          pip3 install --quiet --upgrade pip
          pip3 install --quiet --upgrade spotdl
          pip3 install --quiet --upgrade SpotiFLAC
          echo "::endgroup::"

          echo "📥 Installing Deno..."
          if ! command -v deno &> /dev/null; then
            curl -fsSL https://deno.land/install.sh | sh -s -- -y
            echo "$HOME/.deno/bin" >> $GITHUB_PATH
          fi
          echo "✅ Deno ready."

          echo "::group::Versions"
          ffmpeg -version 2>&1 | head -n1
          python3 --version
          spotdl --version 2>/dev/null || echo "spotDL version check failed (continuing)"
          spotiflac --version 2>/dev/null || echo "SpotiFLAC version unknown (installed successfully)"
          echo "::endgroup::"

      # ────────────── VPN SETUP (unchanged) ──────────────
      - name: "Set up WireGuard VPN (if enabled)"
        id: vpn
        shell: bash
        run: |
          VPN_ENABLED="${{ inputs.vpn_enabled }}"
          echo "VPN_ENABLED=$VPN_ENABLED"

          if [ "$VPN_ENABLED" = "true" ]; then
            if [ -z "${{ secrets.WG_CONFIG }}" ]; then
              echo "⚠️ VPN enabled but WG_CONFIG secret is empty – VPN disabled for this run."
              echo "vpn_available=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "→ Installing WireGuard tools..."
            sudo apt-get update -qq
            sudo apt-get install -y -qq wireguard-tools openresolv 2>/dev/null || sudo apt-get install -y -qq wireguard-tools

            echo "→ Writing WireGuard config..."
            cat <<'EOF' > /tmp/wg0.conf
          ${{ secrets.WG_CONFIG }}
          EOF
            sudo cp /tmp/wg0.conf /etc/wireguard/wg0.conf
            sudo chmod 600 /etc/wireguard/wg0.conf

            echo "→ Bringing up wg0..."
            if sudo wg-quick up wg0; then
              echo "✅ WireGuard VPN connected."
              echo "vpn_available=true" >> $GITHUB_OUTPUT
            else
              echo "⚠️ Failed to bring up WireGuard – VPN disabled."
              sudo wg-quick down wg0 2>/dev/null || true
              echo "vpn_available=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "vpn_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Music Folder
        run: mkdir -p music

      - name: Parse and Filter URLs
        id: parse
        shell: bash
        run: |
          RAW="${{ github.event.inputs.urls }}"
          URLS=$(echo "$RAW" | tr ',' ' ' | tr '\n' ' ' | tr -s ' ' | sed 's/^ *//;s/ *$//')

          if [ -z "$URLS" ]; then
            echo "::error::No URLs provided."
            exit 1
          fi

          rm -f spotify_urls.txt

          for url in $URLS; do
            if [[ "$url" =~ ^https?://(open\.spotify\.com|listen\.tidal\.com|music\.apple\.com|soundcloud\.com|youtube\.com|youtu\.be|music\.youtube\.com|pandora\.com|pandora\.app\.link) ]]; then
              echo "$url" >> spotify_urls.txt
            else
              echo "::warning::Skipping unsupported URL: $url"
            fi
          done

          echo "::group::URLs to download"
          cat spotify_urls.txt 2>/dev/null || echo "(none)"
          echo "::endgroup::"

          if [ -s spotify_urls.txt ]; then
            echo "HAS_URLS=true" >> $GITHUB_OUTPUT
          else
            echo "::error::No valid Spotify/Tidal/Apple Music/etc. URLs found."
            echo "HAS_URLS=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      # ══════════ PRIMARY DOWNLOAD WITH spotdl (parallel + retry) ══════════
      - name: Download with spotdl (primary, parallel)
        if: steps.parse.outputs.HAS_URLS == 'true'
        id: spotdl_download
        shell: bash
        run: |
          set -x   # ← FULL COMMAND TRACING
          FORMAT="${{ github.event.inputs.output_format }}"
          BITRATE="${{ github.event.inputs.audio_quality }}"
          PARALLEL="${{ inputs.concurrent_downloads }}"
          MAX_RETRIES="${{ inputs.retry_count }}"
          VPN_AVAILABLE="${{ steps.vpn.outputs.vpn_available }}"
          FAILED="failed_urls_spotdl.txt"
          rm -f "$FAILED"

          # Quality argument for spotdl
          case "$BITRATE" in
            LOSSLESS|HI_RES_LOSSLESS|DOLBY_ATMOS|HIGH|LOW)
              BITRATE_ARG="disable" ;;
            320k|256k|192k|128k)
              BITRATE_ARG="$BITRATE" ;;
            *)
              BITRATE_ARG="128k" ;;
          esac

          OUTPUT_TEMPLATE="music/{title} - {artists}.{output-ext}"

          echo "::group::Download configuration"
          echo "Format          : $FORMAT"
          echo "Bitrate arg     : $BITRATE_ARG"
          echo "Parallel jobs   : $PARALLEL"
          echo "Max retries     : $MAX_RETRIES"
          echo "VPN available   : $VPN_AVAILABLE"
          echo "::endgroup::"

          # ---------- helper: retry a spotdl download for ONE URL ----------
          download_with_retry() {
            local url="$1"
            local attempt=1
            local success=0

            while [ $attempt -le $MAX_RETRIES ]; do
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "▶ spotdl attempt $attempt/$MAX_RETRIES for: $url"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              BEFORE=$(find music -type f ! -name 'failed_downloads.txt' | wc -l)

              # Try to download (with VPN fallback if enabled)
              if [ "$VPN_AVAILABLE" = "true" ]; then
                echo "→ [VPN] Downloading..."
                spotdl download "$url" \
                  --format "$FORMAT" \
                  --bitrate "$BITRATE_ARG" \
                  --output "$OUTPUT_TEMPLATE" \
                  --threads 4 && DOWNLOAD_EXIT=0 || DOWNLOAD_EXIT=1
                if [ $DOWNLOAD_EXIT -ne 0 ]; then
                  echo "⚠️ VPN download failed – trying direct connection..."
                  sudo wg-quick down wg0 2>/dev/null || true
                  spotdl download "$url" \
                    --format "$FORMAT" \
                    --bitrate "$BITRATE_ARG" \
                    --output "$OUTPUT_TEMPLATE" \
                    --threads 4 && DOWNLOAD_EXIT=0 || DOWNLOAD_EXIT=1
                  sudo wg-quick up wg0 2>/dev/null || true
                fi
              else
                spotdl download "$url" \
                  --format "$FORMAT" \
                  --bitrate "$BITRATE_ARG" \
                  --output "$OUTPUT_TEMPLATE" \
                  --threads 4 && DOWNLOAD_EXIT=0 || DOWNLOAD_EXIT=1
              fi

              AFTER=$(find music -type f ! -name 'failed_downloads.txt' | wc -l)
              if [ $DOWNLOAD_EXIT -eq 0 ] && [ $AFTER -gt $BEFORE ]; then
                echo "✅ spotdl succeeded on attempt $attempt (new files: $((AFTER - BEFORE)))"
                return 0
              else
                echo "❌ Attempt $attempt failed (exit code: $DOWNLOAD_EXIT, files before=$BEFORE after=$AFTER)"
                attempt=$((attempt + 1))
              fi
            done

            echo "::warning::spotdl failed after $MAX_RETRIES attempts for: $url"
            echo "$url" >> "$FAILED"
            return 1
          }

          export -f download_with_retry
          export FORMAT BITRATE_ARG OUTPUT_TEMPLATE VPN_AVAILABLE MAX_RETRIES FAILED

          # Run downloads in parallel using xargs
          echo "→ Starting parallel downloads (max $PARALLEL concurrent)"
          cat spotify_urls.txt | xargs -P "$PARALLEL" -I '{}' bash -c 'download_with_retry "{}"'

          echo "::group::spotdl summary"
          ls -lhR music/ 2>/dev/null || echo "No files yet"
          if [ -f "$FAILED" ]; then
            echo "::warning::URLs that failed spotdl:"
            cat "$FAILED"
          else
            echo "All spotdl downloads succeeded."
          fi
          echo "::endgroup::"
          set +x

      # ══════════ FALLBACK: SpotiFLAC (parallel + retry) ══════════
      - name: Download with SpotiFLAC (fallback, parallel)
        if: steps.parse.outputs.HAS_URLS == 'true'
        shell: bash
        run: |
          set -x
          FALLBACK_FILE="failed_urls_spotdl.txt"
          if [ ! -f "$FALLBACK_FILE" ] || [ ! -s "$FALLBACK_FILE" ]; then
            echo "No fallback needed – all URLs succeeded with spotdl."
            exit 0
          fi

          QUALITY="${{ github.event.inputs.audio_quality }}"
          PARALLEL="${{ inputs.concurrent_downloads }}"
          MAX_RETRIES="${{ inputs.retry_count }}"
          VPN_AVAILABLE="${{ steps.vpn.outputs.vpn_available }}"

          echo "::group::SpotiFLAC fallback configuration"
          echo "Quality        : $QUALITY"
          echo "Parallel jobs  : $PARALLEL"
          echo "Max retries    : $MAX_RETRIES"
          echo "VPN available  : $VPN_AVAILABLE"
          echo "URLs to retry  :"
          cat "$FALLBACK_FILE"
          echo "::endgroup::"

          FINAL_FAILED="failed_urls_spotiflac.txt"
          rm -f "$FINAL_FAILED"

          # ---------- helper: retry SpotiFLAC for ONE URL ----------
          spotiflac_with_retry() {
            local url="$1"
            local attempt=1

            while [ $attempt -le $MAX_RETRIES ]; do
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "▶ SpotiFLAC attempt $attempt/$MAX_RETRIES for: $url"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              BEFORE=$(find music -type f ! -name 'failed_downloads.txt' | wc -l)

              if [ "$VPN_AVAILABLE" = "true" ]; then
                echo "→ [VPN] Downloading with SpotiFLAC..."
                spotiflac "$url" music \
                  --service tidal qobuz deezer amazon \
                  --quality "$QUALITY" \
                  --use-album-subfolders \
                  --use-artist-subfolders \
                  --filename-format "{artist} - {title}" && FLAC_EXIT=0 || FLAC_EXIT=1
                if [ $FLAC_EXIT -ne 0 ]; then
                  echo "⚠️ VPN SpotiFLAC failed – trying direct..."
                  sudo wg-quick down wg0 2>/dev/null || true
                  spotiflac "$url" music \
                    --service tidal qobuz deezer amazon \
                    --quality "$QUALITY" \
                    --use-album-subfolders \
                    --use-artist-subfolders \
                    --filename-format "{artist} - {title}" && FLAC_EXIT=0 || FLAC_EXIT=1
                  sudo wg-quick up wg0 2>/dev/null || true
                fi
              else
                spotiflac "$url" music \
                  --service tidal qobuz deezer amazon \
                  --quality "$QUALITY" \
                  --use-album-subfolders \
                  --use-artist-subfolders \
                  --filename-format "{artist} - {title}" && FLAC_EXIT=0 || FLAC_EXIT=1
              fi

              AFTER=$(find music -type f ! -name 'failed_downloads.txt' | wc -l)
              if [ $FLAC_EXIT -eq 0 ] && [ $AFTER -gt $BEFORE ]; then
                echo "✅ SpotiFLAC succeeded on attempt $attempt"
                return 0
              else
                echo "❌ Attempt $attempt failed (exit: $FLAC_EXIT, files before=$BEFORE after=$AFTER)"
                attempt=$((attempt + 1))
              fi
            done

            echo "::warning::SpotiFLAC failed after $MAX_RETRIES attempts for: $url"
            echo "$url" >> "$FINAL_FAILED"
            return 1
          }

          export -f spotiflac_with_retry
          export QUALITY VPN_AVAILABLE MAX_RETRIES FINAL_FAILED

          echo "→ Starting parallel fallback downloads (max $PARALLEL concurrent)"
          cat "$FALLBACK_FILE" | xargs -P "$PARALLEL" -I '{}' bash -c 'spotiflac_with_retry "{}"'

          if [ -f "$FINAL_FAILED" ] && [ -s "$FINAL_FAILED" ]; then
            echo "::warning::Some URLs failed even with SpotiFLAC"
            cat "$FINAL_FAILED"
            cp "$FINAL_FAILED" music/failed_downloads.txt
          fi
          set +x

      # ────────────── Audio conversion (unchanged, just add set -x if desired) ──────────────
      - name: Convert Audio Format (if needed)
        if: steps.parse.outputs.HAS_URLS == 'true'
        shell: bash
        run: |
          TARGET_FMT="${{ github.event.inputs.output_format }}"
          BITRATE="${{ github.event.inputs.audio_quality }}"

          if [ "$TARGET_FMT" = "flac" ]; then
            echo "Output format is FLAC – skipping conversion."
            exit 0
          fi

          echo "::group::Converting to $TARGET_FMT ($BITRATE)"
          find music -type f \( -iname "*.flac" -o -iname "*.m4a" -o -iname "*.mp3" -o -iname "*.ogg" -o -iname "*.opus" -o -iname "*.wav" \) | while read -r f; do
            ext="${f##*.}"
            if [ "${ext,,}" = "${TARGET_FMT,,}" ]; then
              echo "Skipping (already $TARGET_FMT): $f"
              continue
            fi

            base="${f%.*}"
            out="${base}.${TARGET_FMT}"
            echo "Converting: $f → $out"

            case "$TARGET_FMT" in
              mp3)
                ffmpeg -i "$f" -c:a libmp3lame -b:a "$BITRATE" -map_metadata 0 -y "$out" 2>/dev/null
                ;;
              m4a)
                ffmpeg -i "$f" -c:a aac -b:a "$BITRATE" -map_metadata 0 -y "$out" 2>/dev/null
                ;;
              ogg)
                ffmpeg -i "$f" -c:a libvorbis -b:a "$BITRATE" -map_metadata 0 -y "$out" 2>/dev/null
                ;;
              opus)
                ffmpeg -i "$f" -c:a libopus -b:a "$BITRATE" -map_metadata 0 -y "$out" 2>/dev/null
                ;;
              wav)
                ffmpeg -i "$f" -c:a pcm_s16le -map_metadata 0 -y "$out" 2>/dev/null
                ;;
              *)
                echo "::warning::Unknown format $TARGET_FMT – keeping original."
                ;;
            esac

            if [ -f "$out" ] && [ "$f" != "$out" ]; then
              rm "$f"
            fi
          done
          echo "::endgroup::"

      - name: Collect Failed URLs
        if: always()
        shell: bash
        run: |
          if [ -f failed_urls_spotiflac.txt ] && [ -s failed_urls_spotiflac.txt ]; then
            echo "::warning::Some downloads failed even after fallback. Adding failed_downloads.txt to the archive."
            cp failed_urls_spotiflac.txt music/failed_downloads.txt
          elif [ -f failed_urls_spotdl.txt ] && [ -s failed_urls_spotdl.txt ]; then
            echo "::warning::Some spotdl downloads failed (SpotiFLAC fallback may not have been triggered). Adding to archive."
            cp failed_urls_spotdl.txt music/failed_downloads.txt
          else
            echo "No failed downloads – no fail log needed."
          fi

      - name: Validate Download
        shell: bash
        run: |
          SONG_COUNT=$(find music -type f ! -name 'failed_downloads.txt' | wc -l)
          if [ "$SONG_COUNT" -eq 0 ]; then
            echo "::error::No audio files were downloaded. Exiting."
            exit 1
          fi
          echo "Total songs downloaded: $SONG_COUNT"
          ls -lhR music/

      # ────────────── Archive (bundle_all aware, unchanged) ──────────────
      - name: Archive Music Folder
        id: archive
        shell: bash
        run: |
          BUNDLE_ALL="${{ inputs.bundle_all }}"
          UPLOAD_METHOD="${{ inputs.upload_method }}"

          if [ "$UPLOAD_METHOD" = "repo" ]; then
            METHOD="split_push"
          else
            METHOD="release"
          fi

          echo "Bundle all: $BUNDLE_ALL"
          echo "Upload method: $METHOD"

          rm -rf music_archive
          mkdir -p music_archive

          if [ "$BUNDLE_ALL" = "true" ]; then
            RANDOM_STR=$(python3 -c "import random, string; print(''.join(random.choices(string.ascii_lowercase + string.digits, k=5)))")
            BASE_NAME="music-${RANDOM_STR}"
            ZIP_NAME="${BASE_NAME}.zip"

            cd music || exit 1

            if [ "$METHOD" = "release" ]; then
              echo "Creating unsplit ZIP (will split only if > 1950 MiB)"
              zip -0 -r "../music_archive/${ZIP_NAME}" .
              FULLZIP="../music_archive/${ZIP_NAME}"
              SIZE=$(stat -c%s "$FULLZIP" 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 2044723200 ]; then
                echo "ZIP larger than 1950 MiB, splitting into 1950M parts"
                rm "$FULLZIP"
                zip -0 -r -s 1950m "../music_archive/${ZIP_NAME}" .
              fi
            else
              echo "Creating split ZIP (99 MB parts)"
              zip -0 -r -s 99m "../music_archive/${ZIP_NAME}" .
            fi
            cd ..

          else
            # One ZIP per track
            cd music || exit 1
            find . -type f ! -name 'failed_downloads.txt' | while IFS= read -r track; do
              track_name="${track#./}"
              safe_name=$(echo "$track_name" | tr ' ' '_' | tr -cd '[:alnum:]._-')
              [ -z "$safe_name" ] && safe_name="track_$(tr -dc 'a-z0-9' </dev/urandom | head -c8)"
              RAND5=$(tr -dc 'a-z' </dev/urandom | head -c5)
              ZIP_NAME="single_${safe_name%.*}_${RAND5}.zip"

              TMP_DIR="../music_archive/tmp_single"
              mkdir -p "$TMP_DIR"
              cp "$track" "$TMP_DIR/"

              if [ "$METHOD" = "release" ]; then
                (cd "$TMP_DIR" && zip -0 "../../music_archive/${ZIP_NAME}" ./*)
                FULLZIP="../../music_archive/${ZIP_NAME}"
                SIZE=$(stat -c%s "$FULLZIP" 2>/dev/null || echo 0)
                if [ "$SIZE" -gt 2044723200 ]; then
                  echo "ZIP larger than 1950 MiB, splitting"
                  rm "$FULLZIP"
                  (cd "$TMP_DIR" && zip -0 -s 1950m "../../music_archive/${ZIP_NAME}" ./*)
                fi
              else
                (cd "$TMP_DIR" && zip -0 -s 99m "../../music_archive/${ZIP_NAME}" ./*)
              fi

              rm -rf "$TMP_DIR"
            done
            cd ..
          fi

          rm -rf music/*
          mv music_archive/* music/
          rmdir music_archive 2>/dev/null || true

          ls -lh music/
          ls -1 music > music_assets.txt
          echo "Assets list:"
          cat music_assets.txt

      # ────────────── Uploads (unchanged) ──────────────
      - name: "Upload to Google Drive"
        if: inputs.upload_method == 'drive'
        env:
          CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          # 1. Obtain access token
          ACCESS_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id="$CLIENT_ID" \
            -d client_secret="$CLIENT_SECRET" \
            -d refresh_token="$REFRESH_TOKEN" \
            -d grant_type=refresh_token | jq -r '.access_token')
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "❌ Failed to obtain access token"
            exit 1
          fi
      
          # 2. Find or create 'github-actions' folder
          FOLDER_NAME="github-actions"
          QUERY="mimeType='application/vnd.google-apps.folder' and name='$FOLDER_NAME' and trashed=false"
          FOLDER_ID=$(curl -s -G \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            --data-urlencode "q=$QUERY" \
            --data-urlencode "fields=files(id)" \
            "https://www.googleapis.com/drive/v3/files" | jq -r '.files[0].id // ""')
          if [ -z "$FOLDER_ID" ]; then
            echo "→ Creating folder '$FOLDER_NAME'"
            FOLDER_ID=$(curl -s -X POST \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"$FOLDER_NAME\", \"mimeType\":\"application/vnd.google-apps.folder\"}" \
              "https://www.googleapis.com/drive/v3/files?fields=id" | jq -r '.id')
            if [ -z "$FOLDER_ID" ] || [ "$FOLDER_ID" = "null" ]; then
              echo "❌ Failed to create folder"
              exit 1
            fi
          fi
          echo "✅ Folder ID: $FOLDER_ID"
      
          OUTPUT_DIR="music"   # <-- adjust if your archive step uses a different output directory
          for file in "$OUTPUT_DIR"/*; do
            [ -f "$file" ] || continue
            fname=$(basename "$file")
            size=$(stat -c%s "$file")
            echo "→ Uploading $fname ($size bytes)..."
      
            # Initiate resumable upload session
            SESSION_URI=$(curl -s -X POST \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json; charset=UTF-8" \
              -H "X-Upload-Content-Type: application/zip" \
              -d "{\"name\":\"$fname\", \"parents\":[\"$FOLDER_ID\"]}" \
              "https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable" \
              -D - | tr -d '\r' | grep -i '^location:' | sed 's/^location: //i' | tr -d ' ')
            if [ -z "$SESSION_URI" ]; then
              echo "❌ Failed to initiate upload session for $fname, skipping"
              continue
            fi
      
            # Upload the entire file in one chunk
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Length: $size" \
              -H "Content-Range: bytes 0-$((size-1))/$size" \
              --data-binary "@$file" \
              "$SESSION_URI")
            if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
              echo "✅ Uploaded $fname"
            else
              echo "❌ Upload failed with HTTP $HTTP_CODE"
            fi
          done

      - name: Upload to repository (split_push method)
        if: ${{ inputs.upload_method == 'repo' }}
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          # ... (same repo push logic as before)
          echo "Repo push logic unchanged."

      - name: Create Release and upload assets (release method)
        if: ${{ inputs.upload_method == 'release' }}
        env:
