name: "mhrv-rust-static-exit-node"

on:
  workflow_dispatch:

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # maximum 6 hours

    steps:
      - uses: actions/checkout@v4

      - name: Download cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

      - name: Start Node
        env:
          EXIT_NODE_PSK: ${{ secrets.EXIT_NODE_PSK }}
        run: |
          pip install brotli
          python3 .github/script/rust-exit-node.py --host 127.0.0.1 --port 8181 &
          sleep 2   # give it a moment to bind

      - name: Connect to Cloudflare
        env:
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: |
          ./cloudflared tunnel run --token "$CF_TUNNEL_TOKEN" > /tmp/tunnel.log 2>&1 &
          sleep 10
          echo "🌐 Tunnel established – exit node is now live."

      - name: Run
        run: |
          while true; do
            sleep 3600
            echo "[$(date)] running!"
          done
